<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Summarizer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --c1: #595959;
    --c2: #7f7f7f;
    --c3: #a5a5a5;
    --c4: #cccccc;
    --c5: #f2f2f2;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #f2f2f2, #eaeaea);
    color: var(--c1);
}

/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 100;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 18px 60px;

    background: linear-gradient(90deg, #595959, #7f7f7f);
    color: white;

    box-shadow: 0 6px 25px rgba(0,0,0,0.15);
}

.nav-title {
    font-size: 20px;
    font-weight: 600;
}

.nav-links {
    display: flex;
    gap: 12px;
}

.nav-links a {
    text-decoration: none;
    font-size: 14px;
    padding: 8px 16px;
    border-radius: 20px;

    background: rgba(255,255,255,0.15);
    color: white;

    transition: all 0.3s ease;
}

.nav-links a:hover {
    background: white;
    color: var(--c1);
    transform: translateY(-2px);
}

/* ===== LAYOUT ===== */
.section {
    padding: 120px 40px 40px;
}

.main-layout {
    display: flex;
    gap: 25px;
    max-width: 1200px;
    margin: auto;
}

/* ===== LEFT PANEL ===== */
.left-panel {
    flex: 1;
    padding: 30px;
    border-radius: 16px;

    background: white;
    border: 1px solid var(--c4);

    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* ===== RIGHT PANEL ===== */
.right-panel {
    flex: 1;
    padding: 30px;
    border-radius: 16px;

    background: linear-gradient(135deg, var(--c5), white);
    border: 1px solid var(--c4);

    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* ===== TEXT ===== */
h1 {
    text-align: center;
    margin-bottom: 5px;
}

h3 {
    text-align: center;
    margin-top: 0;
    color: var(--c2);
}

p {
    text-align: center;
    font-size: 14px;
    color: var(--c3);
}

/* ===== FORM ===== */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
}

textarea {
    height: 220px;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--c4);
    font-size: 14px;
    resize: none;
    outline: none;

    background: #fafafa;

    transition: all 0.25s ease;
}

textarea:focus {
    border-color: var(--c2);
    box-shadow: 0 0 0 3px rgba(127,127,127,0.15);
}

/* ===== BUTTON ===== */
button {
    background: linear-gradient(135deg, var(--c1), var(--c2));
    color: white;
    border: none;
    padding: 12px;
    font-size: 14px;
    border-radius: 10px;
    cursor: pointer;

    transition: all 0.3s ease;
}

button:hover {
    background: linear-gradient(135deg, var(--c2), var(--c1));
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* ===== SUMMARY ===== */
#summary-output {
    margin-top: 20px;
}

#summary-heading {
    text-align: center;
    margin: 0;
}

#summary-text {
    margin-top: 10px;
    line-height: 1.6;
    color: var(--c1);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .main-layout {
        flex-direction: column;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-title">Text Summarizer</div>

    <div class="nav-links">
        <a href="https://github.com/SoniVaibhavKumar" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/sonivaibhavkumar/" target="_blank">LinkedIn</a>
    </div>
</div>

<div class="section">
    <div class="main-layout">

        <!-- LEFT -->
        <div class="left-panel">
            <h1>Text Summarizer</h1>
            <h3>Input Content</h3>
            <p>Paste your content here.</p>

            <form id="summarization-form">
                <textarea id="dialogue-input" placeholder="Enter your content here..." required></textarea>
                <button type="submit">Summarize</button>
            </form>
        </div>

        <!-- RIGHT -->
        <div class="right-panel">
            <h1>Summary</h1>
            <h3>Generated Output</h3>
            <p>Your summarized content will appear here.</p>

            <div id="summary-output">
                <h3 id="summary-heading">Content Summary</h3>
                <p id="summary-text"></p>
            </div>
        </div>

    </div>
</div>

<script>
document.getElementById("summarization-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const dialogueInput = document.getElementById("dialogue-input");
    const summaryText = document.getElementById("summary-text");
    const submitButton = e.target.querySelector("button");

    const dialogue = dialogueInput.value.trim();
    if (!dialogue) return;

    summaryText.innerText = "Processing...";
    submitButton.disabled = true;

    try {
        const response = await fetch("/summarize/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dialogue }),
        });

        const data = await response.json();
        summaryText.innerText = data.summary || "No summary returned.";
    } catch (err) {
        summaryText.innerText = `Error: ${err.message}`;
    } finally {
        submitButton.disabled = false;
    }
});
</script>

</body>
</html>
